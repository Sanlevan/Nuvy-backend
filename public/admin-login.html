<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvy | Accès CEO</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Manrope', sans-serif; background-color: #0f172a; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-sm text-center">
        <h1 class="text-4xl text-white mb-8" style="font-family: 'Bagel Fat One', cursive; color:#2A8C9C">Nuvy CEO</h1>
        <div class="bg-slate-900/50 p-8 rounded-3xl border border-slate-800 backdrop-blur-sm shadow-2xl">
            <p class="text-slate-400 text-sm font-bold mb-6 uppercase tracking-widest">Identification requise</p>
            <input type="password" id="ceo-pass" placeholder="Mot de passe" 
                   class="w-full h-14 bg-slate-950 border border-slate-800 rounded-xl px-6 text-white text-center focus:ring-2 focus:ring-teal-500 outline-none transition-all mb-4">
            <button onclick="loginCEO()" class="w-full h-14 bg-[#2A8C9C] hover:bg-[#238391] text-white font-extrabold rounded-xl transition-all active:scale-95 shadow-lg">
                ENTRER DANS LA TOUR
            </button>
            <p id="error" class="text-red-500 text-xs font-bold mt-4 hidden">Mot de passe incorrect</p>
        </div>
    </div>

    <script>
        function loginCEO() {
            const pass = document.getElementById('ceo-pass').value;
            // On redirige simplement avec la clé en paramètre (cachée par le navigateur après coup)
            window.location.href = `/nuvy-ceo-portal?key=` + encodeURIComponent(pass);
        }
        // Permet de valider avec la touche "Entrée"
        document.getElementById('ceo-pass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginCEO();
        });
        // Si l'URL contient une erreur, on affiche le texte en rouge
        if (window.location.search.includes('error=1')) {
            document.getElementById('error').classList.remove('hidden');
        }
    </script>
</body>
</html>
