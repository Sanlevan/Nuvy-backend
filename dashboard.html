<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvy Dashboard</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2A8C9C; --bg: #FAF8F5; --border: #E0DEDA; }
        body { font-family: 'Manrope', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: white; border-right: 1px solid var(--border); padding: 40px 20px; display: flex; flex-direction: column; gap: 30px; }
        .nav-item { padding: 15px; border-radius: 12px; cursor: pointer; color: #888; font-weight: 800; }
        .nav-item.active { color: var(--primary); background: #f0f9fa; }
        .main { flex: 1; padding: 60px; overflow-y: auto; }
        .view { display: none; } .view.active { display: block; }
        .card { background: white; padding: 40px; border-radius: 30px; border: 1px solid var(--border); }
        .btn { padding: 15px 30px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; background: var(--primary); color: white; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="font-size:32px; font-weight:800; color:var(--primary);">Nuvy</div>
        <div id="shop-name" style="font-size:12px; color:#aaa; font-weight:800; text-transform:uppercase;">...</div>
        <div class="nav-item active" onclick="show('live', this)">Accueil Live</div>
        <div class="nav-item" onclick="show('clients', this)">Mes Clients</div>
    </div>

    <div class="main">
        <div id="live" class="view active">
            <h1>Direct</h1>
            <div id="no-client" style="text-align:center; padding:100px; color:#ccc; border:2px dashed #eee; border-radius:30px;">En attente de scan...</div>
            <div id="client-card" class="card" style="display:none;">
                <div style="font-size:64px; font-weight:800; color:var(--primary);" id="c-name">...</div>
                <div id="c-pts" style="margin-bottom:30px; color:#888;"></div>
                <button class="btn" onclick="addPoints(1)">VALIDER +1 TAMPON</button>
                <button onclick="addPoints(-10)" id="btn-gift" class="btn" style="background:#D4AF37; display:none;">OFFRIR CADEAU 🎁</button>
            </div>
        </div>

        <div id="clients" class="view">
            <h1>Répertoire</h1>
            <table width="100%" id="list"></table>
        </div>
    </div>

    <script>
        const socket = io();
        const bNom = localStorage.getItem('nuvy_boutique_nom');
        const bId = localStorage.getItem('nuvy_boutique_id');
        const bSlug = localStorage.getItem('nuvy_boutique_slug');
        let currentClient = null;

        document.getElementById('shop-name').innerText = bNom;
        socket.emit('join-boutique', bSlug);

        socket.on('client-detected', (c) => {
            currentClient = c;
            document.getElementById('no-client').style.display = 'none';
            document.getElementById('client-card').style.display = 'block';
            document.getElementById('c-name').innerText = c.nom;
            document.getElementById('c-pts').innerText = c.tampons + " points | " + (c.recompenses||0) + " cadeaux";
            document.getElementById('btn-gift').style.display = c.recompenses > 0 ? 'inline-block' : 'none';
        });

        async function addPoints(n) {
            await fetch('/clients/' + currentClient.id + '/tampon', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({nb:n}) });
            location.reload();
        }

        function show(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
            if(id === 'clients') load();
        }

        async function load() {
            const res = await fetch('/boutiques/' + bId + '/clients');
            const data = await res.json();
            document.getElementById('list').innerHTML = data.map(c => `<tr><td><b>${c.nom}</b></td><td>${c.tampons}/10 pts</td><td>${c.recompenses} 🎁</td></tr>`).join('');
        }
    </script>
</body>
</html>
