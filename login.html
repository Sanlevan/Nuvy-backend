<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Espace Pro | Nuvy</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; background: #FAF8F5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .login-card { background: white; padding: 50px 40px; border-radius: 30px; text-align: center; width: 100%; max-width: 360px; border: 1px solid #E0DEDA; box-shadow: 0 15px 35px rgba(0,0,0,0.03); }
        .brand { font-size: 38px; font-weight: 800; color: #2A8C9C; letter-spacing: -1.5px; margin-bottom: 5px; font-family: 'Bagel Fat One', cursive; }
        .subtitle { font-size: 14px; color: #888; font-weight: 600; margin-bottom: 40px; }
        input { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 14px; border: 1px solid #E0DEDA; box-sizing: border-box; font-size: 15px; font-family: inherit; background: #FCFCFC; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #2A8C9C; background: #FFF; }
        button { width: 100%; padding: 20px; background: #2A8C9C; color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 800; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(42, 140, 156, 0.2); }
        .error-message { color: #C62828; font-size: 13px; font-weight: 600; margin-top: 15px; display: none; line-height: 1.5; padding: 12px 14px; background: #FEF2F2; border: 1px solid #FECACA; border-radius: 12px; text-align: left; }
        .error-message.warning { color: #92400E; background: #FFFBEB; border-color: #FDE68A; }
        .error-message a { color: inherit; font-weight: 800; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand" style="font-family: 'Bagel Fat One', cursive;">Nuvy</div>
        <div class="subtitle">Espace Commerçant Partenaire</div>
        <input type="text" id="username" placeholder="Identifiant boutique">
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="authentifier()">SE CONNECTER</button>
        <div id="error-msg" class="error-message"></div>
    </div>
    <div style="position: fixed; bottom: 20px; left: 0; right: 0; text-align: center; font-size: 11px; color: #999; font-weight: 600;">
        <a href="/mentions-legales" style="color: #999; text-decoration: none; margin: 0 8px;">Mentions légales</a> ·
        <a href="/cgv" style="color: #999; text-decoration: none; margin: 0 8px;">CGV</a> ·
        <a href="/cgu" style="color: #999; text-decoration: none; margin: 0 8px;">CGU</a> ·
        <a href="/confidentialite" style="color: #999; text-decoration: none; margin: 0 8px;">Confidentialité</a>
    </div>
    <script>
        function afficherErreur(message, type = 'error') {
            const errorDiv = document.getElementById('error-msg');
            errorDiv.innerHTML = message;
            errorDiv.classList.remove('warning');
            if (type === 'warning') errorDiv.classList.add('warning');
            errorDiv.style.display = 'block';
        }

        function resetButton() {
            const btn = document.querySelector('button');
            btn.innerText = "SE CONNECTER";
            btn.disabled = false;
        }

        async function authentifier() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            const btn = document.querySelector('button');

            errorDiv.style.display = 'none';

            if (!user || !pass) {
                afficherErreur("Veuillez remplir tous les champs.");
                return;
            }

            btn.innerText = "CONNEXION...";
            btn.disabled = true;

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: user, pass: pass })
                });

                const data = await res.json().catch(() => ({}));

                if (res.ok) {
                    localStorage.setItem('nuvy_boutique_id', data.boutiqueId);
                    localStorage.setItem('nuvy_boutique_slug', data.slug);
                    localStorage.setItem('nuvy_boutique_nom', data.nom);
                    localStorage.setItem('nuvy_max_tampons', data.maxTampons);
                    localStorage.setItem('nuvy_jwt', data.token);
                    localStorage.setItem('nuvy_plan', data.plan || 'essentiel');
                    localStorage.setItem('nuvy_plan_status', data.plan_status || 'active');
                    window.location.href = '/dashboard';
                    return;
                }

                // 403 = boutique bloquée pour cause d'abonnement (pending_payment, suspended, canceled, inactive)
                if (res.status === 403 && data.blocked) {
                    const msg = (data.error || "Votre boutique n'est pas accessible.")
                        + '<br><br>Une question ? <a href="mailto:contact@nuvy.pro">contact@nuvy.pro</a>';
                    afficherErreur(msg, 'warning');
                    resetButton();
                    return;
                }

                // 401 = identifiants invalides
                if (res.status === 401) {
                    afficherErreur(data.error || "Identifiant ou mot de passe incorrect.");
                    resetButton();
                    return;
                }

                // Autre erreur serveur
                afficherErreur(data.error || "Une erreur est survenue. Réessayez dans quelques instants.");
                resetButton();
            } catch (error) {
                afficherErreur("Erreur de connexion. Vérifiez votre réseau et réessayez.");
                resetButton();
            }
        }

        // Permet de soumettre avec la touche Entrée
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') authentifier();
        });
    </script>
</body>
</html>
