<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvy - Espace Partenaire</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; background: #FAF8F5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 50px 40px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); width: 100%; max-width: 380px; text-align: center; border: 1px solid #E0DEDA; box-sizing: border-box; }
        .logo { font-size: 42px; font-weight: 800; color: #2A8C9C; margin-bottom: 5px; letter-spacing: -1.5px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 35px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 16px; border: 1px solid #E0DEDA; background: #FCFCFC; font-size: 16px; box-sizing: border-box; transition: 0.2s; outline: none; }
        input:focus { border-color: #2A8C9C; background: #fff; }
        button { width: 100%; padding: 20px; background: #2A8C9C; color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(42, 140, 156, 0.2); }
        .error { color: #C62828; font-size: 14px; margin-top: 15px; display: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">Nuvy</div>
        <div class="subtitle">Espace Partenaire</div>
        <input type="text" id="user" placeholder="Identifiant boutique">
        <input type="password" id="pass" placeholder="Mot de passe">
        <button onclick="login()">SE CONNECTER</button>
        <div id="error-msg" class="error">Identifiants incorrects.</div>
    </div>
    <script>
        if(localStorage.getItem('nuvy_boutique_id')) window.location.href = '/dashboard';
        async function login() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const btn = document.querySelector('button');
            if(!u || !p) return;
            btn.innerText = "Connexion...";
            try {
                const res = await fetch('/auth/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user: u, pass: p}) });
                if(res.ok) {
                    const data = await res.json();
                    localStorage.setItem('nuvy_boutique_id', data.boutiqueId);
                    localStorage.setItem('nuvy_boutique_slug', data.slug);
                    window.location.href = '/dashboard';
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                    btn.innerText = "SE CONNECTER";
                }
            } catch(e) {
                document.getElementById('error-msg').innerText = "Erreur réseau.";
                document.getElementById('error-msg').style.display = 'block';
                btn.innerText = "SE CONNECTER";
            }
        }
    </script>
</body>
</html>
