<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvy — Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; background: #0A0A0A; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: #141414; padding: 40px; border-radius: 24px; border: 1px solid #222; width: 100%; max-width: 400px; text-align: center; }
        .logo { font-family: 'DM Serif Display', serif; font-size: 40px; margin-bottom: 30px; }
        .logo span { color: #C0392B; }
        input { width: 100%; background: #1A1A1A; border: 1px solid #333; padding: 16px; border-radius: 12px; color: white; margin-bottom: 15px; outline: none; }
        button { width: 100%; background: #C0392B; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .error { color: #C0392B; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">Nu<span>vy</span></div>
        <div id="error-msg" class="error">Identifiants incorrects</div>
        <input type="text" id="user" placeholder="Utilisateur">
        <input type="password" id="pass" placeholder="Mot de passe">
        <button onclick="login()">Se connecter</button>
    </div>
    <script>
        async function login() {
            const user = document.getElementById('user').value, pass = document.getElementById('pass').value;
            const res = await fetch('/auth/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ user, pass }) });
            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('nuvy_boutique_id', data.boutiqueId);
                localStorage.setItem('nuvy_boutique_slug', data.slug);
                window.location.href = '/dashboard';
            } else { document.getElementById('error-msg').style.display = 'block'; }
        }
    </script>
</body>
</html>
