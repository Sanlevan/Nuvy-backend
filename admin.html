<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvy CEO - Administration</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2A8C9C; --bg: #FAF8F5; --border: #E0DEDA; }
        body { font-family: 'Manrope', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px;}
        .ceo-card { background: white; padding: 40px; border-radius: 35px; border: 1px solid var(--border); width: 100%; max-width: 480px; box-shadow: 0 15px 35px rgba(0,0,0,0.03); }
        .logo { font-size: 32px; font-weight: 800; color: var(--primary); text-align: center; margin-bottom: 30px; letter-spacing: -1px; }
        label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #bbb; margin-bottom: 8px; margin-left: 5px; }
        input, select { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 14px; border: 1px solid var(--border); box-sizing: border-box; outline: none; font-size: 15px; background: #FCFCFC; font-family: inherit; }
        button { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 16px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(42, 140, 156, 0.2); }
        #result { display: none; margin-top: 20px; padding: 20px; border-radius: 15px; font-size: 14px; line-height: 1.5; text-align: center; }
    </style>
</head>
<body>
    <div class="ceo-card">
        <div class="logo">Nuvy CEO</div>
        
        <label>Nom de la boutique</label>
        <input type="text" id="nom" placeholder="Ex: Maison Dorée">
        
        <div style="display:flex; gap:10px;">
            <input type="text" id="user" placeholder="Identifiant">
            <input type="password" id="pass" placeholder="Mot de passe">
        </div>
        
        <label>Catégorie & DA</label>
        <select id="cat">
            <option value="default">✨ Nuvy Classique (Turquoise)</option>
            <option value="boulangerie">🥖 Boulangerie (Beige Doré)</option>
            <option value="pizza">🍕 Pizza (Rouge Tomate)</option>
            <option value="onglerie">💅 Onglerie / Beauté (Rose Chic)</option>
            <option value="coiffeur">💇 Coiffeur / Barbier (Bleu Nuit)</option>
            <option value="cafe">☕ Café / Salon de thé (Brun Café)</option>
        </select>

        <label>Logo Custom (URL)</label>
        <input type="text" id="logoUrl" placeholder="https://...">
        
        <label>Code CEO</label>
        <input type="password" id="ceo" placeholder="••••••••">

        <button onclick="create()">GÉNÉRER LA BOUTIQUE</button>
        <div id="result"></div>
    </div>

    <script>
        async function create() {
            const res = await fetch('/admin/create-boutique', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    nom: document.getElementById('nom').value,
                    username: document.getElementById('user').value,
                    password: document.getElementById('pass').value,
                    ceoKey: document.getElementById('ceo').value,
                    categorie: document.getElementById('cat').value,
                    logo_url: document.getElementById('logoUrl').value
                })
            });
            const data = await res.json();
            const r = document.getElementById('result');
            r.style.display = 'block';
            if(res.ok) {
                r.style.background = '#E8F5E9'; r.style.color = '#2E7D32';
                r.innerHTML = `<b>Boutique Active !</b><br><a href="${data.boutique.join_url}" target="_blank" style="color:inherit;">${data.boutique.join_url}</a>`;
            } else {
                r.style.background = '#FFEBEE'; r.style.color = '#C62828';
                r.innerText = "Erreur : " + data.message;
            }
        }
    </script>
</body>
</html>
