<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvy × Boutique</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; background: #FAF8F5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 35px; border: 1px solid #E0DEDA; width: 100%; max-width: 400px; text-align: center; }
        .header { margin-bottom: 30px; font-weight: 800; font-size: 20px; }
        .nuvy { color: #2A8C9C; } .shop { color: #888; }
        input { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 16px; border: 1px solid #E0DEDA; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 20px; background: #2A8C9C; color: white; border: none; border-radius: 18px; font-weight: 800; font-size: 16px; cursor: pointer; }
        #wallet-area { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header"><span class="nuvy">Nuvy</span> × <span id="shop-name" class="shop">Boutique</span></div>
        
        <div id="form-area">
            <h1>Inscrivez-vous</h1>
            <p style="color:#666; margin-bottom:30px;">Cumulez des tampons et recevez des cadeaux exclusifs.</p>
            <input type="text" id="prenom" placeholder="Prénom">
            <input type="text" id="nom" placeholder="Nom">
            <input type="tel" id="tel" placeholder="06 12 34 56 78">
            <button onclick="register()">CRÉER MA CARTE</button>
        </div>

        <div id="wallet-area">
            <h1 style="color:#2A8C9C">C'est prêt !</h1>
            <p>Ajoutez votre carte à votre iPhone.</p>
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/Add_to_Apple_Wallet_rgb_v.svg" width="200" style="cursor:pointer;" onclick="location.href='/pass/'+clientToken">
        </div>
    </div>

    <script>
        const slug = window.location.pathname.split('/').pop();
        document.getElementById('shop-name').innerText = slug.replace(/-/g, ' ').toUpperCase();
        let clientToken = null;

        async function register() {
            const res = await fetch(`/join/${slug}/create`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prenom: document.getElementById('prenom').value, nom: document.getElementById('nom').value, telephone: document.getElementById('tel').value })
            });
            const data = await res.json();
            clientToken = data.token;
            localStorage.setItem('nuvy_token', clientToken);
            document.getElementById('form-area').style.display = 'none';
            document.getElementById('wallet-area').style.display = 'block';
        }
    </script>
</body>
</html>
