<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votre Carte de Fidélité</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; background: #FAF8F5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .onboarding-card { background: white; padding: 45px 35px; border-radius: 35px; text-align: center; max-width: 400px; width: 100%; border: 1px solid #E0DEDA; box-shadow: 0 15px 35px rgba(0,0,0,0.03); }
        .cobranding { font-weight: 800; font-size: 18px; margin-bottom: 35px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .nuvy-text { color: #2A8C9C; } .shop-text { color: #888; text-transform: uppercase; } .divider { color: #DDD; }
        h1 { font-size: 28px; font-weight: 800; color: #333; margin-bottom: 10px; letter-spacing: -0.5px; }
        p { color: #666; font-size: 15px; line-height: 1.5; margin-bottom: 30px; }
        input { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 16px; border: 1px solid #E0DEDA; box-sizing: border-box; font-size: 16px; font-family: inherit; background: #FCFCFC; outline: none; transition: 0.2s; }
        input:focus { border-color: #2A8C9C; background: #FFF; }
        .btn-submit { width: 100%; padding: 22px; background: #2A8C9C; color: white; border: none; border-radius: 18px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(42, 140, 156, 0.2); }
        #success-view { display: none; }
        .wallet-btn { display: inline-block; margin-top: 25px; }
        .wallet-btn img { height: 50px; }
        .spinner { border: 4px solid rgba(42, 140, 156, 0.1); border-left-color: #2A8C9C; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="onboarding-card">
        <div class="cobranding"><span class="nuvy-text">Nuvy</span><span class="divider">×</span><span id="shop-display" class="shop-text">BOUTIQUE</span></div>
        <div id="form-view">
            <h1>Bienvenue</h1>
            <p>Créez votre carte de fidélité digitale en quelques secondes et commencez à cumuler vos avantages.</p>
            <input type="text" id="prenom" placeholder="Votre prénom">
            <input type="text" id="nom" placeholder="Votre nom">
            <input type="tel" id="telephone" placeholder="Numéro de téléphone">
            <button class="btn-submit" onclick="creerCarte()">CRÉER MA CARTE</button>
        </div>
        <div id="success-view">
            <h1 style="color: #2A8C9C;">Carte prête !</h1>
            <p>Appuyez sur le bouton ci-dessous pour l'ajouter à votre Apple Wallet.</p>
            <a id="wallet-link" href="#" class="wallet-btn">
                <img src="https://developer.apple.com/wallet/add-to-apple-wallet-badge.svg" alt="Ajouter à Apple Wallet">
            </a>
        </div>
    </div>
    <script>
        const urlSlug = window.location.pathname.split('/').pop();
        document.getElementById('shop-display').innerText = urlSlug.replace(/-/g, ' ');
        let passToken = null;
        // 🛡️ NETTOYEUR DE NUMÉRO INFAILLIBLE
        function formaterTelephone(tel) {
            // 1. On retire tout ce qui n'est pas un chiffre ou un '+'
            let clean = tel.replace(/[^\d+]/g, '');
            // 2. Si le client a mis +33 ou 0033, on le transforme en 0
            if (clean.startsWith('+33')) clean = '0' + clean.slice(3);
            if (clean.startsWith('0033')) clean = '0' + clean.slice(4);
            // 3. On vérifie que c'est bien un numéro français valide (10 chiffres, commence par 01 à 09)
            if (/^0[1-9]\d{8}$/.test(clean)) return clean;
            return null; // Renvoie null si le numéro est faux
        }
        async function creerCarte() {
            const prenom = document.getElementById('prenom').value.trim(); 
            const nom = document.getElementById('nom').value.trim(); 
            const telephoneBrut = document.getElementById('telephone').value.trim(); 
            const btn = document.querySelector('.btn-submit');

            if (!prenom || !nom || !telephoneBrut) { 
                alert("Merci de remplir tous les champs."); 
                return; 
            }

            // 🛡️ On passe le numéro dans le nettoyeur
            const telephone = formaterTelephone(telephoneBrut);
            
            if (!telephone) {
                alert("Le numéro de téléphone n'est pas valide (ex: 06 12 34 56 78).");
                return; // Bloque l'inscription si le format est mauvais !
            }
            btn.innerText = "CRÉATION EN COURS..."; btn.disabled = true;
            try {
                const res = await fetch(`/join/${urlSlug}/create`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prenom, nom, telephone }) });
                if (res.ok) {
                    const data = await res.json(); passToken = data.token;
                    localStorage.setItem('nuvy_token', passToken);
                    document.getElementById('wallet-link').href = `/pass/${passToken}`;
                    document.getElementById('form-view').style.display = 'none';
                    document.getElementById('success-view').style.display = 'block';
                } else { alert("Erreur."); btn.innerText = "CRÉER MA CARTE"; btn.disabled = false; }
            } catch (error) { alert("Erreur réseau."); btn.innerText = "CRÉER MA CARTE"; btn.disabled = false; }
        }
        function telechargerPass() { if (passToken) window.location.href = `/pass/${passToken}`; }
    </script>
</body>
</html>
