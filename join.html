<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nuvy - Création de carte</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; background: #FAF8F5; color: #333; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .box { width: 100%; max-width: 400px; text-align: center; background: white; padding: 40px 30px; border-radius: 30px; border: 1px solid #E0DEDA; box-shadow: 0 10px 30px rgba(0,0,0,0.05); box-sizing: border-box; }
        h1 { font-size: 38px; font-weight: 800; color: #2A8C9C; margin-top: 0; margin-bottom: 30px; letter-spacing: -1.5px; }
        .group { margin-bottom: 20px; text-align: left; }
        label { font-size: 11px; font-weight: 800; color: #aaa; text-transform: uppercase; margin-bottom: 8px; display: block; margin-left: 5px; }
        input { width: 100%; background: #Fcfcfc; border: 1px solid #E0DEDA; padding: 18px; border-radius: 16px; color: #333; font-size: 16px; outline: none; box-sizing: border-box; transition: 0.2s; }
        input:focus { border-color: #2A8C9C; background: #fff; }
        button { width: 100%; background: #2A8C9C; color: white; border: none; padding: 20px; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(42, 140, 156, 0.2); }
    </style>
</head>
<body>
    <div class="box">
        <h1>Nuvy</h1>
        <div style="display:flex; gap:15px;">
            <div class="group" style="flex:1;"><label>Prénom</label><input type="text" id="prenom" placeholder="Jean" required></div>
            <div class="group" style="flex:1;"><label>Nom</label><input type="text" id="nom" placeholder="Dupont" required></div>
        </div>
        <div class="group"><label>Téléphone</label><input type="tel" id="tel" placeholder="06 12 34 56 78" required></div>
        <button onclick="register()">Ajouter à Apple Wallet</button>
    </div>
    <script>
        async function register() {
            const prenom = document.getElementById('prenom').value.trim();
            const nom = document.getElementById('nom').value.trim();
            const tel = document.getElementById('tel').value.trim();
            if(!prenom || !nom || !tel) return alert("Veuillez remplir tous les champs !");
            
            const slug = window.location.pathname.split('/').pop();
            const res = await fetch("/join/" + slug + "/create", { 
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({prenom: prenom, nom: nom, telephone: tel}) 
            });
            const data = await res.json();
            if(data.token) {
                localStorage.setItem('nuvy_token', data.token);
                window.location.href = "/pass/" + data.token;
            }
        }
    </script>
</body>
</html>
